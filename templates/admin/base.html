<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Empório Canastra</title>
    <link rel="stylesheet" href="/static/css/catalogo.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        .admin-sidebar {
            background: #2c3e50;
            color: white;
            padding: 20px;
        }
        
        .admin-sidebar h2 {
            margin-bottom: 30px;
            font-size: 1.2rem;
        }
        
        .admin-nav a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .admin-nav a:hover,
        .admin-nav a.active {
            background: #34495e;
        }
        
        .admin-content {
            padding: 30px;
            background: #f8f9fa;
        }
        
        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
            
            .admin-sidebar {
                padding: 15px;
            }
            
            .admin-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h2>🧀 Empório Admin</h2>
            <nav class="admin-nav">
                <a href="/admin/dashboard">📊 Dashboard</a>
                <a href="/admin/produtos">📦 Produtos</a>
                <a href="/admin/produtos/novo">➕ Novo Produto</a>
                <a href="/admin/pedidos">📋 Pedidos</a>
                <a href="/admin/logout">🚪 Sair</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
